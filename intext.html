<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>manli Do you love me?</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f6cbd2;
    font-family: Arial, sans-serif;
}

.container {
    text-align: center;
    position: relative;
    width: 400px;
    height: 350px;
}

img {
    width: 120px;
    margin-bottom: 10px;
}

h1 {
    font-size: 26px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    position: absolute;
    font-size: 16px;
}

#yesBtn {
    background: #ff5e7e;
    color: white;
    left: 50%;
    transform: translateX(-50%);
    bottom: 30px;
}

#noBtn {
    background: white;
    color: black;
    left: 100px;
    top: 220px;
}

#result {
    display: none;
    font-size: 22px;
    margin-top: 10px;
    color: #ff2e63;
}
</style>
</head>

<body>

<div class="container" id="questionContainer">

    <!-- FIRST GIF -->
    <img id="gif1" src="./love.gif" alt="cute">

    <!-- SECOND GIF -->
    <img id="gif2" src="./love2.gif" alt="cute" style="display:none;">

    <h1> manli Do you love me?</h1>

    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>

    <div id="result"> yayy I knew it ❤️</div>

</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const container = document.getElementById("questionContainer");
const result = document.getElementById("result");

const gif1 = document.getElementById("gif1");
const gif2 = document.getElementById("gif2");

// Move NO button
noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (container.clientWidth - noBtn.offsetWidth);
    const y = Math.random() * (container.clientHeight - noBtn.offsetHeight);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// YES click
yesBtn.addEventListener("click", () => {
    gif1.style.display = "none";
    gif2.style.display = "block";
    result.style.display = "block";
});
</script>

</body>
</html>
